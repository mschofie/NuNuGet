name: Machine Setup

runs:
  using: "composite"
  steps:
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      with:
        global-json-file: global.json

    - name: Install .NET tools
      shell: pwsh
      run: |
        dotnet tool restore
